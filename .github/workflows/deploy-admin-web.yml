name: Deploy Admin Panel Web

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web
        env:
          EXPO_PUBLIC_BACKEND_TARGET: deployed
          EXPO_PUBLIC_ADMIN_API_URL_DEPLOYED: ${{ secrets.EXPO_PUBLIC_ADMIN_API_URL_DEPLOYED }}
          EXPO_PUBLIC_ADMIN_API_KEY: ${{ secrets.EXPO_PUBLIC_ADMIN_API_KEY }}
          EXPO_PUBLIC_ADMIN_API_KEY_HEADER: X-Admin-API-Key
        run: npm run build:web

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
